<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15171F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DRIVE">
<title>DRIVE</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2315171F'/%3E%3Ctext x='50' y='68' font-size='54' font-family='sans-serif' font-weight='700' fill='white' text-anchor='middle'%3ED%3C/text%3E%3Ccircle cx='74' cy='62' r='6' fill='%23EE4D2D'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<style>
  :root{ --ink:#15171F; --paper:#F1F2ED; --card:#FFFFFF; --effort:#EE4D2D;
    --progress:#0E9C7E; --muted:#6C7280; --line:#E2E3DC; --soft:#F7F8F4; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper); color:var(--ink); max-width:540px; margin:0 auto; min-height:100vh;
    padding:18px 16px calc(84px + env(safe-area-inset-bottom)); }
  .mono{font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;}
  header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;}
  .logo{font-weight:800; font-size:22px; letter-spacing:-.5px;}
  .logo span{color:var(--effort);}
  .sub{font-size:12px; color:var(--muted); margin-top:2px;}
  nav{display:flex; gap:5px; background:var(--card); padding:5px; border-radius:14px;
      border:1px solid var(--line); position:sticky; top:8px; z-index:20; margin-bottom:18px;}
  nav button{flex:1; border:none; background:transparent; color:var(--muted); font-weight:600;
      font-size:11px; padding:9px 1px; border-radius:10px; cursor:pointer; white-space:nowrap;}
  nav button.on{background:var(--ink); color:#fff;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px;}
  .label{font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .muted{color:var(--muted); font-size:13px; line-height:1.5;}
  h3.sec{font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin:20px 0 10px;}
  input,select{padding:11px 12px; border-radius:10px; border:1px solid var(--line); font-size:15px;
      background:var(--soft); color:var(--ink); outline:none; width:100%; -webkit-appearance:none;}
  input:focus,select:focus{outline:2px solid var(--effort); outline-offset:1px;}
  .row{display:flex; gap:8px;}
  button.primary{background:var(--ink); color:#fff; border:none; border-radius:10px; padding:12px 16px; font-size:15px; font-weight:600; cursor:pointer;}
  button.ghost{background:var(--soft); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14px; font-weight:600; cursor:pointer;}
  .big{font-weight:800; font-size:44px; line-height:1; letter-spacing:-1px;}
  .stat{font-weight:700; font-size:22px;}
  .pill{font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block;}
  .down{color:var(--progress); background:#E6F5F1;}
  .item{display:flex; justify-content:space-between; align-items:flex-start; padding:11px 0; border-top:1px solid var(--soft);}
  .del{background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px; font-size:16px; flex-shrink:0;}
  .datebar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .datebar button{background:transparent;border:none;font-size:20px;color:var(--ink);cursor:pointer;padding:6px 12px;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--ink); color:#fff;
      padding:11px 18px; border-radius:30px; font-size:14px; font-weight:600; z-index:100; opacity:0; transition:opacity .2s; pointer-events:none;}
  .toast.show{opacity:1;}
  .exline{display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:5px 0;}
  .tag{font-size:11px; font-weight:700; color:var(--progress); background:#E6F5F1; padding:2px 8px; border-radius:20px;}
  .bar{height:10px; background:var(--line); border-radius:6px; overflow:hidden;}
  .bar > div{height:100%;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  svg text{font-family:ui-monospace,monospace;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>
  <header>
    <div><div class="logo">DRIVE<span>.</span></div><div class="sub">your training log, on your phone</div></div>
    <div class="mono" style="font-size:12px;color:var(--muted);text-align:right" id="todayLabel"></div>
  </header>
  <nav>
    <button id="tab-today" class="on" onclick="setTab('today')">Today</button>
    <button id="tab-weight" onclick="setTab('weight')">Weight</button>
    <button id="tab-workouts" onclick="setTab('workouts')">Workouts</button>
    <button id="tab-meals" onclick="setTab('meals')">Meals</button>
    <button id="tab-water" onclick="setTab('water')">Water</button>
    <button id="tab-data" onclick="setTab('data')">Data</button>
  </nav>
  <main id="main"></main>
  <div class="toast" id="toast"></div>

<script>
/* ---------------- state ---------------- */
const KEY="drive-data-v3";
let state=load(), tab="today", drinkDate=todayKey(), woDate=todayKey(), mealDate=todayKey();
let draftWO={ title:"", minutes:"", intensity:"moderate", note:"", exercises:[] };

function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const d=JSON.parse(raw);
    d.workouts=d.workouts||{}; d.drinks=d.drinks||{}; d.steps=d.steps||{}; d.water=d.water||{}; d.meals=d.meals||{}; d.savedFoods=d.savedFoods||[];
    if(d.waterGoal==null) d.waterGoal=2500; if(d.stepGoal==null) d.stepGoal=8000;
    return d; } }catch(e){}
  return { unit:"lb", heightCm:null, sex:"male", age:null, activity:1.2, bodyFat:null, customTarget:null, proteinGoal:null,
    startWeight:0, goalWeight:null, weights:[],
    workouts:{}, drinks:{}, steps:{}, water:{}, meals:{}, savedFoods:[], waterGoal:2500, stepGoal:8000 };
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){ toast("Couldn't save"); } }
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ---------------- dates ---------------- */
function pad(n){ return String(n).padStart(2,"0"); }
function keyOf(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayKey(){ return keyOf(new Date()); }
function fromKey(k){ const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); }
function pretty(k){ if(k===todayKey())return"Today"; if(k===keyOf(new Date(Date.now()-864e5)))return"Yesterday";
  return fromKey(k).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function weekDates(k){ const d=fromKey(k),day=(d.getDay()+6)%7,mon=new Date(d); mon.setDate(d.getDate()-day);
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return keyOf(x);}); }
document.getElementById("todayLabel").innerHTML =
  new Date().toLocaleDateString(undefined,{weekday:"long"})+"<br>"+new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"});

/* ---------------- helpers / calcs ---------------- */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function curWeight(){ const w=state.weights.slice().sort((a,b)=>a.date.localeCompare(b.date)); return w.length?w[w.length-1].val:state.startWeight; }
function toKg(v){ return state.unit==="kg"? v : v/2.2046; }
function curKg(){ return toKg(curWeight()); }
function bmr(){
  const kg=curKg();
  if(state.bodyFat){ const lbm=kg*(1-state.bodyFat/100); return 370 + 21.6*lbm; }
  if(!state.heightCm || !state.age) return null;
  const base=10*kg + 6.25*state.heightCm - 5*state.age;
  return state.sex==="female" ? base-161 : base+5;
}
function bmrFormula(){ return state.bodyFat ? "Katch–McArdle" : "Mifflin–St Jeor"; }
function tdee(){ const b=bmr(); return b==null?null:Math.round(b*state.activity); }
function calorieFloor(){ return state.sex==="female"?1200:1500; }
function calcTarget(){ const t=tdee(); if(t==null) return null; const floor=calorieFloor(); return Math.max(floor,t-500); }
function targetIntake(){
  if(state.customTarget) return { value:state.customTarget, custom:true };
  const t=tdee(); if(t==null) return null;
  const raw=t-500, floor=calorieFloor(); return { value:Math.max(floor,raw), clamped:raw<floor, floor }; }
const MET={ light:3.0, moderate:5.0, vigorous:7.0, max:9.0 };
const MET_LABEL={ light:"Light", moderate:"Moderate", vigorous:"Vigorous", max:"Very hard" };
const EXERCISES={
  Chest:["Bench Press","Incline Dumbbell Press","Push-up","Chest Fly","Cable Crossover"],
  Back:["Pull-up","Bent-over Row","Lat Pulldown","Seated Cable Row","Deadlift"],
  Legs:["Back Squat","Leg Press","Romanian Deadlift","Walking Lunge","Leg Curl"],
  Shoulders:["Overhead Press","Lateral Raise","Front Raise","Face Pull","Arnold Press"],
  Arms:["Bicep Curl","Hammer Curl","Tricep Pushdown","Skull Crusher","Dip"],
  Core:["Plank","Crunch","Hanging Leg Raise","Russian Twist","Cable Woodchop"]
};
function burnKcal(minutes,intensity){ const m=Number(minutes)||0, met=MET[intensity]||5;
  return Math.round(met*3.5*curKg()/200*m); }
function stepKcal(steps){ return Math.round((Number(steps)||0)*curKg()*0.0005); }

/* ---------------- nav ---------------- */
function setTab(t){ tab=t;
  ["today","weight","workouts","meals","water","data"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("on",x===t));
  render(); }
function render(){
  if(tab==="today")renderToday(); else if(tab==="weight")renderWeight();
  else if(tab==="workouts")renderWorkouts(); else if(tab==="meals")renderMeals();
  else if(tab==="water")renderWater(); else renderData();
}
let toastTimer;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),2200); }

/* ================= TODAY ================= */
function renderToday(){
  const tk=todayKey(), u=state.unit, cur=curWeight();
  const steps=Number(state.steps[tk]||0);
  const water=Number(state.water[tk]||0);
  const woList=state.workouts[tk]||[];
  const woKcal=woList.reduce((a,w)=>a+(Number(w.kcal)||0),0);
  const drinkCal=(state.drinks[tk]||[]).reduce((a,d)=>a+(Number(d.calories)||0),0);
  const mt=mealTotals(state.meals[tk]||[]);
  const mealCal=mt.cal, protein=Math.round(mt.protein);
  const eaten=Math.round(mealCal+drinkCal);
  const burned=woKcal+stepKcal(steps);
  const t=targetIntake(), main=tdee();

  let html=`
  <div class="card">
    <div class="label">Current weight</div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:6px;">
      <span class="big mono">${cur}</span><span class="muted" style="font-size:16px">${u}</span>
      ${state.startWeight>cur?`<span class="pill down" style="margin-left:auto">▼ ${(state.startWeight-cur).toFixed(1)} ${u}</span>`:''}
    </div>
  </div>`;

  html += `<div class="card"><div class="label">Calorie goal</div>`;
  if(t==null){
    html += `<p class="muted" style="margin-top:8px">Add your height, age and sex on the <strong>Weight</strong> tab for a target dialed to your size — or set your own there.</p>
      <button class="ghost" style="margin-top:8px" onclick="setTab('weight')">Set up target</button></div>`;
  } else {
    html += `<div class="grid2" style="margin-top:10px">
      ${main!=null?`<div><div class="muted" style="font-size:12px">Maintenance</div><div class="mono stat">${main}</div></div>`:''}
      <div><div class="muted" style="font-size:12px">${t.custom?'Your target':'Target intake'}</div><div class="mono stat" style="color:var(--effort)">${t.value}</div></div>
    </div>
    <p class="muted" style="font-size:12px;margin-top:10px">${t.custom?'Manual target — change it on the Weight tab.':'~500 kcal/day under maintenance = about 1 lb/week.'+(t.clamped?` Floored at ${t.floor} kcal so it stays safe.`:'')} Estimate, not medical advice.</p></div>`;
  }

  html += `<div class="card"><div class="label">Protein today</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-top:4px">
      <span class="mono stat" style="color:var(--progress)">${protein}g</span>
      ${state.proteinGoal?`<span class="muted">/ ${state.proteinGoal}g goal</span>`:`<span class="muted">— set a goal on the Meals tab</span>`}
    </div>
    ${state.proteinGoal?`<div class="bar" style="margin-top:8px"><div style="width:${Math.min(100,protein/state.proteinGoal*100)}%;background:var(--progress)"></div></div>
      <div class="muted" style="font-size:12px;margin-top:6px">${protein>=state.proteinGoal?'goal hit 💪':(state.proteinGoal-protein)+'g to go'}</div>`:''}
  </div>`;

  html += `<div class="grid2">
    <div class="card" style="margin:0">
      <div class="label">Steps</div>
      <div class="mono stat" style="margin-top:4px">${steps.toLocaleString()}</div>
      <div class="muted" style="font-size:11px">goal ${state.stepGoal.toLocaleString()} · ~${stepKcal(steps)} kcal</div>
      <div class="bar" style="margin-top:8px"><div style="width:${Math.min(100,steps/state.stepGoal*100)}%;background:var(--progress)"></div></div>
      <div class="row" style="margin-top:8px;gap:6px">
        <button class="ghost" style="flex:1;padding:9px" onclick="addSteps(1000)">+1k</button>
        <button class="ghost" style="flex:1;padding:9px" onclick="addSteps(2500)">+2.5k</button>
        <input id="stepIn" type="number" inputmode="numeric" placeholder="set" style="flex:1.3;padding:9px" onchange="setSteps(this.value)">
      </div>
    </div>
    <div class="card" style="margin:0">
      <div class="label">Water</div>
      <div class="mono stat" style="margin-top:4px">${water}<span style="font-size:13px;color:var(--muted)"> /${state.waterGoal} ml</span></div>
      <div class="muted" style="font-size:11px">${Math.round(water/state.waterGoal*100)}% of goal</div>
      <div class="bar" style="margin-top:8px"><div style="width:${Math.min(100,water/state.waterGoal*100)}%;background:#3D9BE5"></div></div>
      <div class="row" style="margin-top:8px;gap:6px">
        <button class="ghost" style="flex:1;padding:9px" onclick="addWater(250)">+250</button>
        <button class="ghost" style="flex:1;padding:9px" onclick="addWater(500)">+500</button>
        <button class="ghost" style="flex:1;padding:9px" onclick="setTab('water')">more</button>
      </div>
    </div>
  </div>`;

  html += `<div class="card"><div class="label">Today's energy</div>
    <div class="grid2" style="margin-top:10px">
      <div><div class="muted" style="font-size:12px">Eaten (food + drinks)</div><div class="mono stat" style="color:var(--effort)">${eaten}</div></div>
      <div><div class="muted" style="font-size:12px">Burned (workouts + steps)</div><div class="mono stat" style="color:var(--progress)">${burned}</div></div>
    </div>`;
  if(t!=null){ const left=t.value-eaten, pct=Math.min(100,eaten/t.value*100);
    html += `<div class="bar" style="margin-top:12px;height:10px"><div style="width:${pct}%;background:${eaten>t.value?'var(--effort)':'var(--progress)'}"></div></div>
      <div class="muted" style="font-size:12px;margin-top:6px">${left>=0?left.toLocaleString()+" kcal left to hit your target":Math.abs(left).toLocaleString()+" kcal over target"}</div>`; }
  html += `</div>`;

  document.getElementById("main").innerHTML=html;
}
function addSteps(n){ const tk=todayKey(); state.steps[tk]=(Number(state.steps[tk]||0))+n; save(); render(); }
function setSteps(v){ const tk=todayKey(); state.steps[tk]=Math.max(0,Number(v)||0); save(); render(); }

/* ================= WEIGHT ================= */
function renderWeight(){
  const w=state.weights.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const current=w.length?w[w.length-1].val:state.startWeight, u=state.unit;
  const lost=state.startWeight-current, toGoal=state.goalWeight!=null?(current-state.goalWeight):null;
  const imperial=(u==="lb");
  const ft=state.heightCm?Math.floor(state.heightCm/30.48):"";
  const inch=state.heightCm?Math.round((state.heightCm/2.54)-(Math.floor(state.heightCm/30.48)*12)):"";

  let html=`
  <div class="card"><div class="label">Current weight</div>
    <div style="display:flex;align-items:baseline;gap:12px;margin-top:6px;">
      <span class="big mono">${current}</span><span class="muted" style="font-size:16px">${u}</span></div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
      ${lost>0?`<span class="pill down">▼ ${lost.toFixed(1)} ${u} from ${state.startWeight}</span>`:''}
      ${toGoal!=null?`<span class="pill" style="background:var(--soft);color:var(--muted)">${toGoal>0?toGoal.toFixed(1)+" "+u+" to goal":"goal reached 🎯"}</span>`:''}
    </div></div>
  <div class="card"><div class="label">Trend</div>${weightGraph(w)}</div>
  <div class="card"><div class="label">Log a weigh-in</div>
    <div class="row" style="margin-top:10px;">
      <input id="wVal" type="number" inputmode="decimal" placeholder="weight in ${u}" style="flex:1.2">
      <input id="wDate" type="date" value="${todayKey()}" style="flex:1.4"></div>
    <button class="primary" style="width:100%;margin-top:10px;" onclick="logWeight()">Save weigh-in</button>
  </div>`;

  // body + goal
  html += `<h3 class="sec">Body & goal</h3><div class="card">
    <div class="row">
      <div style="flex:1"><div class="label">Start</div>
        <input type="number" inputmode="decimal" value="${state.startWeight}" onchange="setStart(this.value)" style="margin-top:6px"></div>
      <div style="flex:1"><div class="label">Goal</div>
        <input type="number" inputmode="decimal" value="${state.goalWeight??''}" placeholder="opt" onchange="setGoal(this.value)" style="margin-top:6px"></div>
      <div style="width:74px"><div class="label">Unit</div>
        <select onchange="setUnit(this.value)" style="margin-top:6px">
          <option value="lb" ${u==='lb'?'selected':''}>lb</option><option value="kg" ${u==='kg'?'selected':''}>kg</option></select></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div style="flex:1.4"><div class="label">Height</div>
        ${imperial
          ? `<div class="row" style="margin-top:6px"><input id="hFt" type="number" inputmode="numeric" placeholder="ft" value="${ft}" onchange="setHeightImp()"><input id="hIn" type="number" inputmode="numeric" placeholder="in" value="${inch}" onchange="setHeightImp()"></div>`
          : `<input id="hCm" type="number" inputmode="numeric" placeholder="cm" value="${state.heightCm??''}" onchange="setHeightCm(this.value)" style="margin-top:6px">`}
      </div>
      <div style="width:84px"><div class="label">Age</div>
        <input type="number" inputmode="numeric" value="${state.age??''}" placeholder="yrs" onchange="setAge(this.value)" style="margin-top:6px"></div>
      <div style="width:96px"><div class="label">Sex</div>
        <select onchange="setSex(this.value)" style="margin-top:6px">
          <option value="male" ${state.sex==='male'?'selected':''}>Male</option>
          <option value="female" ${state.sex==='female'?'selected':''}>Female</option></select></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div style="flex:1"><div class="label">Body fat % <span style="text-transform:none;font-weight:400">(opt)</span></div>
        <input type="number" inputmode="decimal" value="${state.bodyFat??''}" placeholder="e.g. 25" onchange="setBodyFat(this.value)" style="margin-top:6px"></div>
      <div style="flex:1.6"><div class="label">Daily activity</div>
        <select onchange="setActivity(this.value)" style="margin-top:6px">
          <option value="1.2" ${state.activity==1.2?'selected':''}>Sedentary — mostly sitting</option>
          <option value="1.375" ${state.activity==1.375?'selected':''}>Lightly active — on feet some</option>
          <option value="1.55" ${state.activity==1.55?'selected':''}>Active — moving most of day</option>
          <option value="1.725" ${state.activity==1.725?'selected':''}>Very active — physical job</option>
        </select></div>
    </div>
    <p class="muted" style="font-size:11px;margin-top:6px">Set activity for your <strong>everyday</strong> movement, not the workouts you log here — those are tracked separately so they aren't counted twice. Adding body fat % switches to a formula that's usually more accurate if you're carrying size.</p>`;

  const main=tdee(), calc=calcTarget();
  if(main!=null){
    const floored=(main-500)<calorieFloor();
    html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="grid2">
        <div><div class="muted" style="font-size:12px">Maintenance</div><div class="mono stat">${main}<span style="font-size:12px;color:var(--muted)"> kcal</span></div></div>
        <div><div class="muted" style="font-size:12px">Suggested · −1 lb/wk</div><div class="mono stat" style="color:var(--effort)">${calc}<span style="font-size:12px;color:var(--muted)"> kcal</span></div></div>
      </div>
      <p class="muted" style="font-size:12px;margin-top:10px">${bmrFormula()} × activity, minus ~500 kcal/day.${floored?` Floored at ${calorieFloor()} kcal for safety.`:''} Estimate — trust the scale: if weight isn't moving after ~2 weeks, nudge down. Not medical advice.</p>
    </div>`;
  } else {
    html += `<p class="muted" style="margin-top:12px">Add height + age (or a body fat %) for a calculated suggestion — or just set your own target below.</p>`;
  }
  html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line)">
    <div class="label">Your daily calorie target</div>
    <div class="row" style="margin-top:6px">
      <input type="number" inputmode="numeric" value="${state.customTarget??''}" placeholder="${calc!=null?calc:'e.g. 2000'}" onchange="setCustomTarget(this.value)" style="flex:1">
      ${state.customTarget?`<button class="ghost" onclick="setCustomTarget('')">Use calculated</button>`:''}

function weightGraph(w){
  if(!w.length) return `<div class="muted" style="margin-top:8px">Log a weigh-in to start your graph.</div>`;
  const W=340,H=180,P=30;
  let min=Math.min(...w.map(p=>p.val)),max=Math.max(...w.map(p=>p.val));
  if(state.goalWeight!=null){ min=Math.min(min,state.goalWeight); max=Math.max(max,state.goalWeight); }
  if(min===max){ min-=2; max+=2; }
  const m=(max-min)*0.12; min-=m; max+=m;
  const ts=w.map(p=>fromKey(p.date).getTime()),t0=Math.min(...ts),t1=Math.max(...ts);
  const X=t=>t1===t0?W/2:P+(t-t0)/(t1-t0)*(W-2*P), Y=v=>H-P-(v-min)/(max-min)*(H-2*P);
  const pts=w.map(p=>[X(fromKey(p.date).getTime()),Y(p.val)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${H-P} L${pts[0][0].toFixed(1)} ${H-P} Z`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="var(--effort)"/>`).join("");
  let goal="";
  if(state.goalWeight!=null){ const gy=Y(state.goalWeight);
    goal=`<line x1="${P}" y1="${gy}" x2="${W-P}" y2="${gy}" stroke="var(--progress)" stroke-width="1.4" stroke-dasharray="4 4"/>
      <text x="${W-P}" y="${gy-5}" font-size="9" fill="var(--progress)" text-anchor="end">goal ${state.goalWeight}</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="margin-top:8px;display:block">
    <text x="${P-6}" y="${Y(max-(max-min)*0.12)+4}" font-size="9" fill="var(--muted)" text-anchor="end">${Math.round(max-(max-min)*0.12)}</text>
    <text x="${P-6}" y="${Y(min+(max-min)*0.12)+4}" font-size="9" fill="var(--muted)" text-anchor="end">${Math.round(min+(max-min)*0.12)}</text>
    <path d="${area}" fill="var(--effort)" opacity="0.08"/>${goal}
    <path d="${line}" fill="none" stroke="var(--effort)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>${dots}
    <text x="${pts[0][0]}" y="${H-P+15}" font-size="9" fill="var(--muted)" text-anchor="middle">${w[0].date.slice(5)}</text>
    <text x="${pts[pts.length-1][0]}" y="${H-P+15}" font-size="9" fill="var(--muted)" text-anchor="middle">${w[w.length-1].date.slice(5)}</text>
  </svg>`;
}

function addWater(n){ const k=drinkDate; state.water[k]=Math.max(0,(Number(state.water[k]||0))+n); save(); render(); }
function setWaterGoal(v){ state.waterGoal=Math.max(0,Number(v)||0); save(); render(); }
function addDrink(){ const name=document.getElementById("dName").value.trim(); if(!name){ toast("Give the drink a name"); return; }
  if(!state.drinks[drinkDate]) state.drinks[drinkDate]=[];
  state.drinks[drinkDate].push({id:uid(),name,calories:document.getElementById("dCal").value,ml:document.getElementById("dMl").value,time:Date.now()});
  save(); toast("Drink added"); render(); }
function delDrink(id){ state.drinks[drinkDate]=(state.drinks[drinkDate]||[]).filter(d=>d.id!==id); save(); render(); }

/* ================= DATA ================= */
function renderData(){
  document.getElementById("main").innerHTML=`
  <div class="card"><div class="label">Put it on your phone</div>
    <p class="muted" style="margin-top:8px">1. Get this file onto your phone (Drive, email, USB).<br>
      2. Open it in <strong>Chrome</strong>.<br>3. Tap <strong>⋮ → Add to Home screen</strong>.<br>
      4. Launches full screen, runs offline, data stays on the phone.</p>
    <p class="muted" style="font-size:12px;margin-top:8px">A real installable APK means wrapping this in an Android shell (Capacitor / PWABuilder). The home-screen install is the no-build route.</p>
  </div>
  <div class="card"><div class="label">Back up your data</div>
    <p class="muted" style="margin-top:8px">Your log lives only on this device. Export before switching phones or clearing your browser.</p>
    <div class="row" style="margin-top:10px">
      <button class="ghost" style="flex:1" onclick="exportData()">⬇ Export</button>
      <button class="ghost" style="flex:1" onclick="document.getElementById('importIn').click()">⬆ Import</button></div>
    <input id="importIn" type="file" accept="application/json,.json" style="display:none" onchange="importData(event)">
  </div>
  <div class="card"><div class="label">Reset</div>
    <p class="muted" style="margin-top:8px">Wipe everything and start fresh. Can't be undone.</p>
    <button class="ghost" style="margin-top:10px;color:var(--effort);border-color:var(--effort)" onclick="resetAll()">Erase all data</button>
  </div>`;
}
function exportData(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="drive-backup-"+todayKey()+".json"; a.click(); URL.revokeObjectURL(a.href); toast("Backup downloaded"); }
function importData(ev){ const file=ev.target.files[0]; if(!file) return; const fr=new FileReader();
  fr.onload=()=>{ try{ const d=JSON.parse(fr.result);
    if(d&&d.weights){ d.workouts=d.workouts||{}; d.drinks=d.drinks||{}; d.steps=d.steps||{}; d.water=d.water||{}; d.meals=d.meals||{}; d.savedFoods=d.savedFoods||[]; if(d.waterGoal==null)d.waterGoal=2500; if(d.stepGoal==null)d.stepGoal=8000; state=d; save(); toast("Backup loaded"); render(); }
    else toast("That doesn't look like a DRIVE backup"); }catch(e){ toast("Couldn't read that file"); } };
  fr.readAsText(file); }
function resetAll(){ if(confirm("Erase all data? This can't be undone.")){ localStorage.removeItem(KEY); state=load(); save(); toast("Reset done"); render(); } }

/* ---------------- boot ---------------- */
render();
if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }

</script>
</body>
</html>
